name: Scheduled Repo Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  workflow_dispatch: # Allows you to run it manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Initialize the working directory
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN }}
          fetch-depth: 0

      # Step 2: Sync from the original repo
      - name: Sync from Upstream
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          # Add the original repo as a remote source
          git remote add upstream https://x-access-token:${{ secrets.SYNC_TOKEN }}@github.com/acharyasailesh/promotermanagement.git
          # Fetch and merge the changes
          git fetch upstream main
          git checkout main
          git merge upstream/main
          # Push the updates to this repo
          git push origin main
